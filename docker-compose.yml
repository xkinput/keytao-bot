services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
      - ACCOUNT=${ACCOUNT}
      - NAPCAT_QUICK_PASSWORD=${NAPCAT_QUICK_PASSWORD:-}
      - NAPCAT_QUICK_PASSWORD_MD5=${NAPCAT_QUICK_PASSWORD_MD5:-}
    ports:
      - "6099:6099"   # WebUI: http://localhost:6099/webui
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qq:/app/.config/QQ
    networks:
      - bot-net

  bot:
    build: .
    container_name: keytao-bot
    restart: always
    env_file: .env
    ports:
      - "8080:8080"   # HTTP API for Live2D web frontend
    volumes:
      - .:/app
    networks:
      - bot-net
    depends_on:
      - napcat

  napcat-watchdog:
    image: alpine:latest
    container_name: napcat-watchdog
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "apk add --no-cache docker-cli &&
             echo '0 3 * * * docker restart napcat' | crontab - &&
             crond -f -l 8"

networks:
  bot-net:
    driver: bridge
