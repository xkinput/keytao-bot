server {
    listen 443 ssl;
    server_name napcat.rea.ink;

    ssl_certificate     /etc/letsencrypt/live/napcat.rea.ink/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/napcat.rea.ink/privkey.pem;

    auth_basic "NapCat Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:6099;
        proxy_http_version 1.1;

        # WebSocket support (NapCat WebUI requires it)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name napcat.rea.ink;
    return 301 https://$host$request_uri;
}
